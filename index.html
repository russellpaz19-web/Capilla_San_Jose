<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capilla San José VDM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
    <div class="topbar-contenido">
        <h1><span class="light">Capilla</span> SAN JOSÉ</h1>
        <div class="derecha">
            <span class="icono">🔍</span>
            <span class="icono">☰</span>
        </div>
    </div>

    <div class="logo-medallon">
        <img src="logo-capilla.png" alt="Logo Capilla">
    </div>
</header>

<section class="hero">
    <div class="hero-texto">
        <h2>PAPA<br>LEÓN XIV</h2>
    </div>
    <div class="hero-imagen">
        <img src="leo-xiv.png" alt="Papa León XIV">
    </div>
</section>

<section class="sacramentos">
    <div class="sacramento-contenedor">
        <div class="sacramento">
            <h3>Bautismo</h3>
            <div class="linea-gruesa azul"></div>
        </div>
        <div class="linea-vertical"></div>
        <div class="sacramento">
            <h3>Primera Comunión</h3>
            <div class="linea-gruesa amarillo"></div>
        </div>
        <div class="linea-vertical"></div>
        <div class="sacramento">
            <h3>Confirmación</h3>
            <div class="linea-gruesa naranja"></div>
        </div>
    </div>
</section>

<section class="calendario">
    <div class="calendario-contenedor">
        <div class="calendario-imagen">
            <img src="Virgen_Merced.png" alt="Virgen Merced">
        </div>

        <div class="calendario-box">
            <h2 class="titulo-seccion">Calendario Litúrgico</h2>

            <div class="nav-mes">
                <button onclick="cambiarMes(-1)">◀</button>
                <h3 id="mes-anio"></h3>
                <button onclick="cambiarMes(1)">▶</button>
            </div>

            <div class="dias-semana">
                <div>Dom</div><div>Lun</div><div>Mar</div>
                <div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
            </div>

            <div id="calendario-dias" class="dias"></div>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Capilla San José VDM</p>
</footer>

<script>
let fecha = new Date();

function calcularPascua(anio) {
    let a = anio % 19;
    let b = Math.floor(anio / 100);
    let c = anio % 100;
    let d = Math.floor(b / 4);
    let e = b % 4;
    let f = Math.floor((b + 8) / 25);
    let g = Math.floor((b - f + 1) / 3);
    let h = (19*a + b - d - g + 15) % 30;
    let i = Math.floor(c / 4);
    let k = c % 4;
    let l = (32 + 2*e + 2*i - h - k) % 7;
    let m = Math.floor((a + 11*h + 22*l)/451);
    let mes = Math.floor((h + l - 7*m + 114)/31)-1;
    let dia = ((h + l - 7*m + 114) % 31)+1;
    return new Date(anio, mes, dia);
}

function sumarDias(fecha, dias) {
    let nueva = new Date(fecha);
    nueva.setDate(nueva.getDate() + dias);
    return nueva;
}

function formato(fecha) {
    const dia = String(fecha.getDate()).padStart(2,'0');
    const mes = String(fecha.getMonth()+1).padStart(2,'0');
    return `${mes}-${dia}`;
}

function renderCalendario() {
    const diasContainer = document.getElementById("calendario-dias");
    diasContainer.innerHTML = "";

    const anio = fecha.getFullYear();
    const mes = fecha.getMonth();

    const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                   "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    document.getElementById("mes-anio").innerText = meses[mes] + " " + anio;

    const pascua = calcularPascua(anio);

    const celebracionesMoviles = {
        [formato(sumarDias(pascua, -7))]: "Domingo de Ramos",
        [formato(sumarDias(pascua, -6))]: "Lunes Santo",
        [formato(sumarDias(pascua, -5))]: "Martes Santo",
        [formato(sumarDias(pascua, -4))]: "Miércoles Santo",
        [formato(sumarDias(pascua, -3))]: "Jueves Santo",
        [formato(sumarDias(pascua, -2))]: "Viernes Santo",
        [formato(sumarDias(pascua, -1))]: "Sábado Santo",
        [formato(pascua)]: "Domingo de Resurrección",
        [formato(sumarDias(pascua, 49))]: "Pentecostés"
    };

    const celebracionesFijas = {
        "01-01": "Santa María",
        "03-19": "San José",
        "05-01": "San José Obrero",
        "09-15": "Nuestra Señora de los Dolores",
        "10-04": "San Francisco de Asís",
        "12-08": "Solemnidad de la Inmaculada Concepción de la Virgen María",
        "12-25": "Navidad"
    };

    const primerDia = new Date(anio, mes, 1).getDay();
    const ultimoDia = new Date(anio, mes+1, 0).getDate();

    for(let i=0;i<primerDia;i++){ diasContainer.innerHTML += `<div></div>`; }

    for(let i=1;i<=ultimoDia;i++){
        const fechaActual = new Date(anio, mes, i);
        const diaSemana = fechaActual.getDay();

        let clase = "dia";
        let texto = "";

        const clave = formato(fechaActual);

        if(diaSemana === 0) { 
            clase += " domingo"; 
            texto = "Misa: 08:00 AM"; 
        }

        if(celebracionesFijas[clave]) {
            clase += " festivo";
            texto = celebracionesFijas[clave];
        }

        if(celebracionesMoviles[clave]) {
            clase += " festivo";
            texto = celebracionesMoviles[clave];
        }

        if(diaSemana === 0 && (celebracionesFijas[clave] || celebracionesMoviles[clave])) {
            texto = "Misa: 08:00 AM - " + texto;
        }

        diasContainer.innerHTML += `
            <div class="${clase}">
                ${i}
                <span class="tooltip">${texto}</span>
            </div>
        `;
    }
}

function cambiarMes(valor) {
    fecha.setMonth(fecha.getMonth()+valor);
    renderCalendario();
}

renderCalendario();
</script>

</body>
</html>
